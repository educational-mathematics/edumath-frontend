<div class="login-container">
    <mat-card class="login-card">
    <mat-card-header class="header-centered">
        <mat-card-title class="logo">Inicia Sesión</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        
          <label class="custom-label">Correo electrónico</label>
          <mat-form-field appearance="outline" class="full-width-input custom-field">
            <mat-icon matPrefix>email</mat-icon>
            <input matInput type="email" formControlName="email" placeholder="Correo electrónico"
              [class.invalid-input]="isInvalid('email')" />
          </mat-form-field>
      
          <label class="custom-label">Contraseña</label>
          <mat-form-field appearance="outline" class="full-width-input custom-field">
            <mat-icon matPrefix>lock</mat-icon>
          
            <input
              matInput
              [type]="hidePassword ? 'password' : 'text'"
              formControlName="password"
              placeholder="Contraseña"
              [class.invalid-input]="isInvalid('password')"
            />
          
            <button
              mat-icon-button
              matSuffix
              type="button"
              class="toggle-password"
              (click)="hidePassword = !hidePassword"
            >
              <mat-icon>
                {{ hidePassword ? 'visibility_off' : 'visibility' }}
              </mat-icon>
            </button>
          </mat-form-field>
      
          <button mat-raised-button type="submit" class="login-button" [disabled]="loading">
            <mat-icon>login</mat-icon>
            {{ loading ? 'Ingresando...' : 'Ingresar' }}
          </button>
      
        </form>

        <div class="aux-links">
            <a (click)="goForgotPassword()" class="forgot-password">¿Olvidaste tu contraseña?</a>
        </div>
        <!-- Notificación flotante con @if -->
        @if (showNotification) {
        <div class="notification">
            <span>{{ notificationMessage }}</span>
            <button (click)="closeNotification()">✖</button>
        </div>
        }
    </mat-card-content>

    <mat-card-actions class="register-link-container">
        <p class="register-text">
        ¿No tienes una cuenta? <a routerLink="/register" class="register-link">Regístrate</a>
        </p>
    </mat-card-actions>
    </mat-card>
</div>
