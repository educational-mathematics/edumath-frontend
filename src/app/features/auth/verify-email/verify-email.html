<div class="container">
  <mat-card class="card">

    <mat-card-header class="header-centered">
      <mat-card-title class="logo">Verificar correo</mat-card-title>
    </mat-card-header>

    <mat-card-content>

      <p class="description">
        Ingresa el código de 6 dígitos que enviamos a tu correo.
      </p>

      <form [formGroup]="form" (ngSubmit)="verify()" class="form">

        <label class="custom-label">Correo electrónico</label>
        <mat-form-field appearance="outline" class="full custom-field">
          <mat-icon matPrefix>email</mat-icon>
          <input matInput type="email" formControlName="email"
            placeholder="tucorreo@dominio.com"
            readonly aria-readonly="true" />
        </mat-form-field>

        <label class="custom-label">Código</label>
        <mat-form-field appearance="outline" class="full custom-field">
          <mat-icon matPrefix>vpn_key</mat-icon>
          <input matInput type="text" formControlName="code"
            maxlength="6" placeholder="000000" />
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button type="submit"
            class="action-button"
            [disabled]="form.invalid || loading">
            {{ loading ? 'Verificando...' : 'Verificar' }}
          </button>
        </div>

        <button mat-button type="button"
          class="resend-button"
          (click)="resend()"
          [disabled]="cooldown > 0 || loading">
          Reenviar código {{ cooldown > 0 ? '(' + cooldown + 's)' : '' }}
        </button>

        @if (message) {
          <div class="msg">{{ message }}</div>
        }

      </form>

    </mat-card-content>
  </mat-card>
</div>
